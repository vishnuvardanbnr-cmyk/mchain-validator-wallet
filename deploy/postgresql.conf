##############################################################
## PostgreSQL tuning — 24 GB RAM / 8 vCPU
## Append these to /etc/postgresql/15/main/postgresql.conf
## Then: sudo systemctl restart postgresql
##############################################################

# Memory
shared_buffers            = 6GB       # 25% of RAM for Postgres cache
effective_cache_size      = 18GB      # hint to query planner (OS + PG cache total)
work_mem                  = 32MB      # per sort/hash operation; 150 conns × 32MB = 4.8 GB peak
maintenance_work_mem      = 1GB       # for VACUUM, CREATE INDEX

# WAL / Checkpoints
wal_buffers               = 64MB
checkpoint_completion_target = 0.9
min_wal_size              = 1GB
max_wal_size              = 4GB

# Connections
# Keep low — PgBouncer handles client multiplexing
max_connections           = 200

# Parallelism — use multiple vCPUs for large queries
max_worker_processes      = 8
max_parallel_workers      = 8
max_parallel_workers_per_gather = 4

# Disk
random_page_cost          = 1.1      # NVMe SSD (vs 4.0 for spinning disk)
effective_io_concurrency  = 200      # NVMe can handle many concurrent I/Os

# Logging (minimal for production)
log_min_duration_statement = 1000    # log queries slower than 1 second
log_checkpoints           = on
log_lock_waits            = on
