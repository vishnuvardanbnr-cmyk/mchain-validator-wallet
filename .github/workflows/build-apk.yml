name: Build Android APK

on:
  # Run manually from the Actions tab whenever you want a new APK
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

  # Also run automatically on every push to main
  push:
    branches:
      - main
    paths:
      # Only trigger when wallet code actually changed
      - "artifacts/mchain-wallet/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    name: Build APK (${{ github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js + pnpm ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 3. EAS Build ───────────────────────────────────────────────────────────
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS
        working-directory: artifacts/mchain-wallet
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ── 4. Download & upload APK as artifact ───────────────────────────────────
      - name: Download built APK
        working-directory: artifacts/mchain-wallet
        run: |
          # Get the URL of the latest completed build and download the APK
          BUILD_URL=$(eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --non-interactive \
            --json \
            | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d)[0].artifacts.buildUrl)")
          echo "APK URL: $BUILD_URL"
          curl -L "$BUILD_URL" -o mchain-wallet.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mchain-wallet-${{ github.event.inputs.profile || 'preview' }}-${{ github.run_number }}
          path: artifacts/mchain-wallet/mchain-wallet.apk
          retention-days: 30
