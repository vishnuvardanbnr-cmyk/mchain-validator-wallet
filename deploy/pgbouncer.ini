;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; PgBouncer config — high-concurrency connection pool
;; Place at: /etc/pgbouncer/pgbouncer.ini
;; Restart: sudo systemctl restart pgbouncer
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[databases]
;; Replace with your actual DB name, user, and password
mchain = host=127.0.0.1 port=5432 dbname=mchain

[pgbouncer]
;; Listen on this port — app connects to 6432, PgBouncer connects to Postgres 5432
listen_port = 6432
listen_addr = 127.0.0.1

;; Transaction pooling: connection released back to pool after each transaction.
;; Best throughput for REST APIs.
pool_mode = transaction

;; Max clients PgBouncer accepts (all 8 Node workers × 10 connections each + headroom)
max_client_conn = 500

;; Max real Postgres connections per database
;; Postgres on 24 GB can handle ~200 comfortably
default_pool_size = 150

;; Reserve for admin/monitoring
reserve_pool_size = 10
reserve_pool_timeout = 5

;; Log
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

;; Auth — use md5 or scram-sha-256
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Admin access
admin_users = pgbouncer_admin
