name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
  push:
    branches:
      - main
    paths:
      - "artifacts/mchain-wallet/**"

jobs:
  build:
    name: Build APK (${{ github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS
        working-directory: artifacts/mchain-wallet
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download built APK
        working-directory: artifacts/mchain-wallet
        run: |
          BUILD_URL=$(eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --non-interactive \
            --json \
            | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d)[0].artifacts.buildUrl)")
          curl -L "$BUILD_URL" -o mchain-wallet.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mchain-wallet-${{ github.event.inputs.profile || 'preview' }}-${{ github.run_number }}
          path: artifacts/mchain-wallet/mchain-wallet.apk
          retention-days: 30
