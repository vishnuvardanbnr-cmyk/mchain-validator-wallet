name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Expo prebuild (generate native Android project)
        working-directory: artifacts/mchain-wallet
        run: pnpm exec expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          EXPO_PUBLIC_API_URL: http://5.189.184.202

      - name: Make gradlew executable
        working-directory: artifacts/mchain-wallet/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: artifacts/mchain-wallet/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mchain-wallet-${{ github.run_number }}
          path: artifacts/mchain-wallet/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
