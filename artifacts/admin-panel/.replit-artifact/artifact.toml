kind = "web"
previewPath = "/admin/"
title = "MChain P2P Admin"
version = "1.0.0"
id = "artifacts/admin-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/admin-panel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-panel", "run", "build" ]
publicDir = "artifacts/admin-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
